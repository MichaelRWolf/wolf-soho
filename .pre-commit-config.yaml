repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix

  - repo: local
    hooks:
      - id: prettier-markdown
        name: prettier (markdown tables)
        entry: npx prettier --write --prose-wrap never
        language: system
        types: [markdown]
