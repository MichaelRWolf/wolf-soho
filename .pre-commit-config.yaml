repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=102400"] # 100MB

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-ligatures
        types: [markdown]
      - id: fix-smartquotes
        types: [markdown]
      - id: fix-unicode-dashes
        types: [markdown]

  - repo: local
    hooks:
      # Warning: Following check will prevent staging of already-committed .org files (count: 3)
      - id: forbid-org-files
        name: forbid org-mode files
        entry: bash -c 'echo "Do not commit .org files." >&2; exit 1'
        language: system
        files: \.org$

      - id: markdown-table-formatter
        name: markdown-table-formatter (align columns)
        entry: npx markdown-table-formatter
        language: system
        types: [markdown]

      # Disabled: 2026-04-27 - Not applicable (no shell startup files)
      # - id: shellcheck-bash-startup
      #   name: shellcheck (startup files not typed as shell)
      #   entry: shellcheck
      #   language: system
      #   files: '^home/(\.aliases|\.bash_login|\.bash_prompt)$'
      #   args: [--shell=bash, -x]
